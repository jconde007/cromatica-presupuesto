name: Meta Ads Daily Review

on:
  schedule:
    # 9:00 AM America/Mexico_City = 15:00 UTC (CST, sin horario de verano)
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Si true, no manda email, solo loggea el brief"
        required: false
        default: "false"

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Meta daily review
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'Cromática Ads <onboarding@resend.dev>' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/meta-daily-review.mjs
